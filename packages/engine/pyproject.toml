[project]
name = "rift-engine-core"
version = "0.1.0"
description = "Backtesting and research engine for RIFT — backtest, walk-forward, Monte Carlo, sweeps, signals, indicators."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "pyarrow>=17.0",
    "numpy>=2.0",
    "scipy>=1.14",
    "scikit-learn>=1.5",
    "hmmlearn>=0.3",
    "ruptures>=1.1",
    "optuna>=4.0",
    "xgboost>=3.0",
    "arch>=8.0",
    "rift-core",
    "rift-data",
    "rift-substrate",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_engine"]

[tool.uv.sources]
rift-core = { path = "../core", editable = true }
rift-data = { path = "../data", editable = true }
rift-substrate = { path = "../substrate", editable = true }
