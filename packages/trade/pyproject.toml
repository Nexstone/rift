[project]
name = "rift-trade"
version = "0.1.0"
description = "Live trading and execution for RIFT — Hyperliquid order placement, builder fee, risk gates, audit, supervisor."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "numpy>=2.0",
    "hyperliquid-python-sdk>=0.23.0",
    "rich>=13.0",
    "rift-core",
    "rift-data",
    "rift-engine-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_trade"]

[tool.uv.sources]
rift-core = { path = "../core", editable = true }
rift-data = { path = "../data", editable = true }
rift-engine-core = { path = "../engine", editable = true }
