[project]
name = "rift-portfolio"
version = "0.1.0"
description = "Multi-strategy portfolio management for RIFT — allocation, pair trading, correlation guard, VaR."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "numpy>=2.0",
    "scipy>=1.14",
    "rift-core",
    "rift-data",
    "rift-engine-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_portfolio"]

[tool.uv.sources]
rift-core = { path = "../core", editable = true }
rift-data = { path = "../data", editable = true }
rift-engine-core = { path = "../engine", editable = true }
