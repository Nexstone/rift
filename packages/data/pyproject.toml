[project]
name = "rift-data"
version = "0.1.0"
description = "Data ingestion + cache for RIFT — Hyperliquid S3 archive, REST API, websocket feed."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "pyarrow>=17.0",
    "numpy>=2.0",
    "hyperliquid-python-sdk>=0.23.0",
    "boto3>=1.40",
    "lz4>=4.4",
    "pysocks>=1.7",
    "rift-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_data"]

[tool.uv.sources]
rift-core = { path = "../core", editable = true }
