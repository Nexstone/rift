[project]
name = "rift-substrate"
version = "0.1.0"
description = "RIFT Layer 1 — data, frictions, risk, and statistical machinery for HL-native quant research."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "numpy>=1.26",
    "scipy>=1.11",
    "statsmodels>=0.14",
    "hmmlearn>=0.3",
    "ruptures>=1.1",
    "pandas>=2.0",
    # Pinned to 0.6.x: our wrappers (in indicators/core.py) match column
    # prefixes that exist in this series. A future 0.7 may change function
    # signatures or output shape — evaluate before bumping the upper bound.
    "pandas-ta-classic>=0.6.20,<0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_substrate"]
