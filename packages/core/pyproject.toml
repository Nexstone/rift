[project]
name = "rift-core"
version = "0.1.0"
description = "Shared types, schema, config, and NDJSON output protocol for RIFT packages."
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rift_core"]
